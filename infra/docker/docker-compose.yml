services:
  ollama:
    image: ollama/ollama:latest
    container_name: cimiento-ollama
    ports:
      - "11434:11434"
    volumes:
      - ../../models/ollama:/root/.ollama
    # Descomenta para usar GPU AMD vía ROCm (requiere setup previo)
    # devices:
    #   - /dev/kfd
    #   - /dev/dri
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: cimiento-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  postgres:
    image: postgis/postgis:16-3.4
    container_name: cimiento-postgres
    environment:
      POSTGRES_USER: cimiento
      POSTGRES_PASSWORD: cimiento
      POSTGRES_DB: cimiento
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  qdrant_data:
  postgres_data:
