services:
  ollama:
    image: ollama/ollama:latest
    container_name: cimiento-ollama
    profiles: ["ai"]
    ports:
      - "11434:11434"
    volumes:
      - ../../models/ollama:/root/.ollama
    # Descomenta para usar GPU AMD vía ROCm (requiere setup previo)
    # devices:
    #   - /dev/kfd
    #   - /dev/dri
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: cimiento-qdrant
    profiles: ["ai"]
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  postgres:
    image: postgis/postgis:16-3.4
    container_name: cimiento-postgres
    environment:
      POSTGRES_USER: cimiento
      POSTGRES_PASSWORD: cimiento
      POSTGRES_DB: cimiento
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cimiento -d cimiento"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    container_name: cimiento-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://cimiento:cimiento@postgres:5432/cimiento
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - backend_output_data:/app/backend/data/outputs
    restart: unless-stopped

  frontend:
    build:
      context: ../..
      dockerfile: frontend/Dockerfile
    container_name: cimiento-frontend
    depends_on:
      backend:
        condition: service_started
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  qdrant_data:
  postgres_data:
  backend_output_data:
