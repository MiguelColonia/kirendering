# Caso multi-planta: 5 plantas con carga suficiente para requerir dos núcleos verticales

solar:
  id: solar-edificio-5-plantas-dos-nucleos
  contour:
    - {x: 0, y: 0}
    - {x: 90, y: 0}
    - {x: 90, y: 90}
    - {x: 0, y: 90}
  north_angle_deg: 0.0
  max_buildable_height_m: 18.0

program:
  project_id: edificio-5-plantas-dos-nucleos
  num_floors: 5
  floor_height_m: 3.0
  typologies:
    - id: T2
      name: Vivienda dos dormitorios
      min_useful_area: 70.0
      max_useful_area: 90.0
      num_bedrooms: 2
      num_bathrooms: 1
      rooms:
        - {type: LIVING,   min_area: 20.0, min_short_side: 3.5}
        - {type: KITCHEN,  min_area: 10.0, min_short_side: 2.5}
        - {type: BEDROOM,  min_area: 12.0, min_short_side: 2.8}
        - {type: BEDROOM,  min_area: 10.0, min_short_side: 2.5}
        - {type: BATHROOM, min_area:  4.0, min_short_side: 1.5}
  mix:
    - {typology_id: T2, count: 60}
