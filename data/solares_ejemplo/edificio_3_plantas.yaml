# Caso multi-planta: edificio residencial de 3 plantas con un núcleo vertical

solar:
  id: solar-edificio-3-plantas
  contour:
    - {x: 0, y: 0}
    - {x: 45, y: 0}
    - {x: 45, y: 45}
    - {x: 0, y: 45}
  north_angle_deg: 0.0
  max_buildable_height_m: 12.0

program:
