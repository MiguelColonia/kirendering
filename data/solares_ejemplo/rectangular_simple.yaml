# Caso base: solar cuadrado 30×30 m, programa de 10 viviendas T2
#
# Nota: un solar de 20×30=600 m² resulta insuficiente para 10 T2 (10×70=700 m²).
# Se usa 30×30=900 m² para garantizar factibilidad.

solar:
  id: solar-rectangular-30x30
  contour:
    - {x: 0, y: 0}
    - {x: 30, y: 0}
    - {x: 30, y: 30}
    - {x: 0, y: 30}
  north_angle_deg: 0.0
  max_buildable_height_m: 9.0

program:
  project_id: proyecto-ejemplo
  num_floors: 1
  floor_height_m: 3.0
  typologies:
    - id: T2
      name: Vivienda dos dormitorios
      min_useful_area: 70.0
      max_useful_area: 90.0
      num_bedrooms: 2
      num_bathrooms: 1
      rooms:
        - {type: LIVING,   min_area: 20.0, min_short_side: 3.5}
        - {type: KITCHEN,  min_area: 10.0, min_short_side: 2.5}
        - {type: BEDROOM,  min_area: 12.0, min_short_side: 2.8}
        - {type: BEDROOM,  min_area: 10.0, min_short_side: 2.5}
        - {type: BATHROOM, min_area:  4.0, min_short_side: 1.5}
  mix:
    - {typology_id: T2, count: 10}
